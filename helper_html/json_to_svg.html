<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>SVG Viewer</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header>
            <div class="header-content">
                <div class="logo">🔐 TOTP Tools</div>
                <nav>
                    <a href="index.html">← Back to Home</a>
                </nav>
            </div>
        </header>

        <main>
            <div class="wrap">
                <h1>🖼️ SVG Viewer</h1>
                <p class="hint">Paste a JSON response or raw SVG, then render it.</p>

                <textarea id="input" spellcheck="false" placeholder='Paste JSON like {"svg":"..."} or a raw SVG string'></textarea>
                <br />
                <button type="button" onclick="render()">Render SVG</button>

                <div id="preview"></div>
            </div>
        </main>

        <footer class="footer">
            <p>Copyright &copy; <span id="year"></span> Django TOTP Helper Tools | All rights reserved
            </p>
        </footer>
        <script src="scripts.js"></script>
    </body>

</html>
