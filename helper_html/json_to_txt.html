<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>JSON to TXT</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header>
            <div class="header-content">
                <div class="logo">🔐 TOTP Tools</div>
                <nav>
                    <a href="index.html">← Back to Home</a>
                </nav>
            </div>
        </header>

        <main>
            <div class="wrap">
                <h1>📝 JSON to TXT</h1>
                <p class="hint">Paste JSON like {"backup_codes":["code1","code2"]}, then download a text file.</p>

                <label for="filename">File name</label>
                <input id="filename" type="text" value="backup_codes.txt" />

                <label for="input">JSON input</label>
                <textarea id="input" spellcheck="false" placeholder='Paste JSON here'></textarea>

                <button type="button" onclick="downloadTxt()">Download TXT</button>

                <div id="preview"></div>
            </div>
        </main>

        <footer class="footer">
            <p>Copyright &copy; <span id="year"></span> Django TOTP Helper Tools | All rights reserved
            </p>
        </footer>
        <script src="scripts.js"></script>
    </body>

</html>
