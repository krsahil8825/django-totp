<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>SVG Viewer</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #f5f5f5;
                color: #222;
                padding: 20px;
            }

            .wrap {
                max-width: 900px;
                margin: 0 auto;
            }

            textarea {
                width: 100%;
                min-height: 220px;
                padding: 12px;
                border: 1px solid #ccc;
                border-radius: 8px;
                font-family: Consolas, monospace;
                font-size: 14px;
                box-sizing: border-box;
            }

            button {
                margin: 12px 0;
                padding: 10px 16px;
                border: 0;
                border-radius: 8px;
                background: #111;
                color: #fff;
                cursor: pointer;
            }

            #preview {
                margin-top: 16px;
                padding: 16px;
                background: #fff;
                border: 1px solid #ddd;
                border-radius: 8px;
                overflow: auto;
            }

            .hint {
                color: #666;
                margin-bottom: 10px;
            }
        </style>
    </head>

    <body>
        <div class="wrap">
            <h1>SVG Viewer</h1>
            <p class="hint">Paste a JSON response or raw SVG, then render it.</p>

            <textarea id="input" spellcheck="false" placeholder='Paste JSON like {"svg":"..."} or a raw SVG string'></textarea>
            <br />
            <button type="button" onclick="render()">Render</button>

            <div id="preview"></div>
        </div>

        <script>
            function jsonToSvg(value) {
                let data = value;

                if (typeof data === 'string') {
                    const trimmed = data.trim();
                    if (!trimmed) {
                        return '';
                    }

                    try {
                        data = JSON.parse(trimmed);
                    } catch (error) {
                        return trimmed
                            .replace(/\\n/g, '\n')
                            .replace(/\\r/g, '\r')
                            .replace(/\\t/g, '\t')
                            .replace(/\\"/g, '"')
                            .replace(/\\\\/g, '\\')
                            .replace(/svg:/g, '')
                            .replace(/xmlns:svg=/g, 'xmlns=');
                    }
                }

                if (data && typeof data === 'object') {
                    if (typeof data.svg === 'string') {
                        return data.svg
                            .replace(/svg:/g, '')
                            .replace(/xmlns:svg=/g, 'xmlns=');
                    }

                    return '';
                }

                return '';
            }

            function render() {
                const input = document.getElementById('input').value;
                const svg = jsonToSvg(input);
                document.getElementById('preview').innerHTML = svg;
            }
        </script>
    </body>

</html>
